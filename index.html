<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Firebase Auth Template</title>
</head>
<body>

  <!-- 1. The button your players will click to authenticate -->
  <button id="loginBtn">Sign in with Google (Email)</button>
  <p id="statusMessage"></p>

  <!-- 2. Firebase SDKs Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyA49UPpB4Ofi8N0nFp1giYXD2XyIZ9fEjI",
      authDomain: "gameforge-df613.firebaseapp.com",
      projectId: "gameforge-df613.firebaseapp.com"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Force selection of student domain accounts (Optional but recommended)
    provider.setCustomParameters({
      hd: 'iiitl.ac.in',
      prompt: 'select_account'
    });

    // STEP 2: SET THE RIGHT VARIABLES

    // This is the URL of the deployed backend server tracking system
    const BACKEND_URL = "http://localhost:3000/track-user"; 
    
    // Each game should have a unique Game ID string assigned to them
    const GAME_ID = /*"game_123"*/ ; //paste your game Id here 

    // STEP 3: LOGIN LOGIC - BIND THIS TO YOUR GAME UI

    const loginBtn = document.getElementById('loginBtn');
    const statusEl = document.getElementById('statusMessage');

    loginBtn.addEventListener('click', async () => {
      loginBtn.disabled = true;
      statusEl.textContent = "Logging in...";
      
      try {
        // Trigger the Google popup authentication
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Get ID token generated by Firebase
        const idToken = await user.getIdToken();
        statusEl.textContent = "Authenticating with server...";
        
        // Send token to the backend to be securely verified & stored 
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken, gameId: GAME_ID })
        });

        const data = await response.json();

        if (response.ok) {
          statusEl.textContent = data.message || "Successfully tracked participation!";
          statusEl.style.color = "green";
          // TODO: TRIGGER YOUR GAME START HERE!
        } else {
          statusEl.textContent = data.error || "Failed to record tracking info.";
          statusEl.style.color = "red";
        }

      } catch (error) {
        console.error("Authentication Error:", error);
        if (error.code === 'auth/popup-closed-by-user') {
          statusEl.textContent = "Authentication popup was closed.";
        } else {
          statusEl.textContent = "Error logging in.";
        }
        statusEl.style.color = "red";
      } finally {
        loginBtn.disabled = false;
      }
    });

  </script>
</body>
</html>
